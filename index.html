<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Breathe</title>
<style>
  :root{
    --bg:#f4f6f8; --card:rgba(255,255,255,.72); --line:rgba(0,0,0,.06);
    --ink:#1c1c1e; --ink2:#6e6e73; --ink3:#aeaeb2;
    --accent:#34a394; --accent-soft:rgba(52,163,148,.12);
    --exhale:#5b8def; --hold:#8e8ee0;
    --r-lg:24px; --r-md:14px;
    --shadow:0 8px 30px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background:linear-gradient(180deg,#f7f9fb 0%, #eef2f5 100%);
    color:var(--ink); min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    -webkit-font-smoothing:antialiased;
  }
  main{width:100%; max-width:520px; padding:max(20px, env(safe-area-inset-top)) 20px 48px;
    display:flex; flex-direction:column; align-items:center; gap:18px;}

  h1{font-size:1.35rem; font-weight:700; letter-spacing:-.02em; padding-top:14px;}
  h1 + p{font-size:.85rem; color:var(--ink2); margin-top:2px;}

  /* ---- iOS segmented control ---- */
  .segment{
    display:flex; width:100%; background:rgba(120,120,128,.12);
    border-radius:12px; padding:2px; position:relative;
  }
  .segment button{
    flex:1; border:none; background:transparent; padding:9px 4px;
    font-family:inherit; font-size:.86rem; font-weight:500; color:var(--ink);
    border-radius:10px; cursor:pointer; transition:all .25s ease; letter-spacing:-.01em;
  }
  .segment button.on{
    background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.10), 0 0 1px rgba(0,0,0,.08);
    font-weight:600;
  }
  .segment button:disabled{opacity:.45; cursor:default;}
  .segment.small{width:auto; min-width:200px;}

  /* ---- card ---- */
  .card{
    width:100%; background:var(--card); backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
    border-radius:var(--r-lg); border:1px solid var(--line);
    box-shadow:var(--shadow); padding:16px 18px;
    display:flex; flex-direction:column; gap:14px;
  }
  .row{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .row .label{font-size:.92rem; font-weight:500;}
  .row .sub{font-size:.76rem; color:var(--ink2); margin-top:1px;}

  /* stepper */
  .stepper{display:flex; align-items:center; gap:0; background:rgba(120,120,128,.12);
    border-radius:10px; overflow:hidden;}
  .stepper button{
    width:44px; height:36px; border:none; background:transparent; font-size:1.25rem;
    color:var(--ink); cursor:pointer; font-family:inherit;
  }
  .stepper button:active{background:rgba(120,120,128,.16);}
  .stepper button:disabled{color:var(--ink3);}
  .stepper .v{min-width:44px; text-align:center; font-size:1rem; font-weight:600;
    font-variant-numeric:tabular-nums;}

  /* iOS switch */
  .switch{position:relative; width:51px; height:31px; border-radius:999px;
    background:rgba(120,120,128,.22); cursor:pointer; transition:background .25s; border:none;}
  .switch::after{content:''; position:absolute; top:2px; left:2px; width:27px; height:27px;
    border-radius:50%; background:#fff; box-shadow:0 2px 6px rgba(0,0,0,.2); transition:left .25s;}
  .switch.on{background:var(--accent);}
  .switch.on::after{left:22px;}

  #boxVarRow{display:none;}
  #boxVarRow.show{display:flex;}

  /* ---------- stage ---------- */
  .stage{
    position:relative; width:min(72vw,300px); height:min(72vw,300px);
    margin-top:6px; display:flex; align-items:center; justify-content:center;
  }
  .orb{
    position:absolute; width:52%; height:52%; border-radius:50%;
    background:var(--accent);
    transform:scale(.68); will-change:transform;
    transition:background .8s ease;
  }
  .orb.exh{background:var(--exhale);}
  .orb.hold{background:var(--hold);}

  .boxpath{position:absolute; inset:4%; display:none;}
  .boxpath.show{display:block;}
  .boxpath svg{width:100%; height:100%; overflow:visible;}
  .boxpath rect{fill:none; stroke:rgba(0,0,0,.12); stroke-width:1.6;}
  .boxdot{fill:var(--accent);}

  /* nose outline superimposed on the orb (alternate mode) */
  .nose{position:absolute; width:46%; height:46%; display:none; pointer-events:none; z-index:2;}
  .nose.show{display:block;}
  .nose svg{width:100%; height:100%; overflow:visible;}
  .nose path.outline{fill:none; stroke:rgba(28,28,30,.28); stroke-width:2.4;
    stroke-linecap:round; stroke-linejoin:round;}
  .nose .nostril{fill:none; stroke:rgba(28,28,30,.28); stroke-width:2.4; stroke-linecap:round;
    transition:all .5s ease;}
  .nose .nostril.open{stroke:#0d7a6c; stroke-width:3.4;
    filter:drop-shadow(0 0 5px rgba(13,122,108,.55));}
  .nose .nostril.closed{opacity:.18;}
  .nose .block{stroke:rgba(28,28,30,.45); stroke-width:2.6; stroke-linecap:round;
    opacity:0; transition:opacity .5s ease;}
  .nose .block.show{opacity:.7;}

  /* nostril chips (only in alternate mode) */
  .nostrils{position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    display:none; gap:10px;}
  .nostrils.show{display:flex;}
  .nos{
    padding:6px 14px; border-radius:999px; font-size:.72rem; font-weight:600;
    letter-spacing:.04em; background:rgba(120,120,128,.10); color:var(--ink3);
    transition:all .5s ease;
  }
  .nos.open{background:var(--accent); color:#fff;}
  .nos.closed{opacity:.4;}

  /* ---------- readout BELOW the animation ---------- */
  .readout{text-align:center; min-height:118px; display:flex; flex-direction:column;
    align-items:center; gap:2px;}
  .phase{font-size:1.05rem; font-weight:600; letter-spacing:.16em; text-transform:uppercase;
    color:var(--ink2);}
  .count{font-size:3.4rem; font-weight:200; letter-spacing:-.02em;
    font-variant-numeric:tabular-nums; line-height:1.05;}
  .hint{font-size:.9rem; color:var(--ink2); max-width:300px; line-height:1.45; min-height:2.6em;}

  .progress{width:100%; max-width:300px; height:5px; border-radius:999px;
    background:rgba(120,120,128,.14); overflow:hidden;}
  .progress i{display:block; height:100%; width:0%; background:var(--accent);
    border-radius:999px; transition:width .4s linear;}
  .meta{font-size:.76rem; color:var(--ink3); font-variant-numeric:tabular-nums;}

  /* ---------- controls ---------- */
  .controls{display:flex; gap:12px; width:100%; max-width:340px; margin-top:2px;}
  .btn{
    border:none; border-radius:999px; font-family:inherit; font-size:1rem;
    font-weight:600; cursor:pointer; padding:15px 0; transition:transform .15s, opacity .2s;
    letter-spacing:-.01em;
  }
  .btn:active{transform:scale(.97);}
  .btn.primary{flex:2; background:var(--accent); color:#fff;
    box-shadow:0 6px 20px -4px rgba(52,163,148,.5);}
  .btn.ghost{flex:1; background:rgba(120,120,128,.12); color:var(--ink);}
  .btn:disabled{opacity:.35; cursor:default; transform:none;}

  footer{max-width:460px; padding:0 24px 40px; text-align:center;
    font-size:.78rem; color:var(--ink3); line-height:1.65;}

  /* ---- screen switching ---- */
  body:not(.insession) .session-only{display:none !important;}
  body.insession .setup-only{display:none !important;}

  .backBtn{
    align-self:flex-start; border:none; background:transparent; cursor:pointer;
    font-family:inherit; font-size:1.02rem; font-weight:500; color:var(--accent);
    padding:8px 4px; display:flex; align-items:center; gap:2px; letter-spacing:-.01em;
  }
  .backBtn span.ch{font-size:1.5rem; line-height:1; margin-top:-2px;}
  .sessionTitle{font-size:1.05rem; font-weight:600; color:var(--ink);
    text-align:center; margin-top:-38px; pointer-events:none;}

  @media (prefers-reduced-motion:reduce){ .orb{transition:none;} }
</style>
</head>
<body>
<main>
  <div style="text-align:center" class="setup-only">
    <h1>Breathe</h1>
    <p>Guided breathing · three techniques</p>
  </div>

  <div class="segment setup-only" id="modeSeg" role="tablist">
    <button data-mode="alt" role="tab">Alternate</button>
    <button data-mode="box" class="on" role="tab" aria-selected="true">Box</button>
    <button data-mode="478" role="tab">4·7·8</button>
  </div>

  <div class="card setup-only">
    <div class="row">
      <div><div class="label">Session</div><div class="sub" id="sessSub">Number of full cycles</div></div>
      <div class="segment small" id="sessSeg">
        <button class="on" data-kind="cycles">Cycles</button>
        <button data-kind="time">Minutes</button>
      </div>
    </div>
    <div class="row">
      <div><div class="label" id="amtLabel">Cycles</div></div>
      <div class="stepper">
        <button id="minus" aria-label="decrease">−</button>
        <div class="v" id="amtVal">6</div>
        <button id="plus" aria-label="increase">+</button>
      </div>
    </div>
    <div class="row" id="boxVarRow">
      <div><div class="label">Pattern</div><div class="sub">4·4·6·2 relaxes more deeply</div></div>
      <div class="segment small" id="boxVarSeg">
        <button class="on" data-var="classic">4·4·4·4</button>
        <button data-var="sleep">4·4·6·2</button>
      </div>
    </div>
    <div class="row">
      <div><div class="label">Sound</div><div class="sub">Breath sounds, heartbeat, beeps</div></div>
      <button class="switch on" id="soundToggle" role="switch" aria-checked="true" aria-label="Sound"></button>
    </div>
    <div class="row">
      <div><div class="label">Voice</div><div class="sub">Speaks each cue aloud</div></div>
      <button class="switch on" id="voiceToggle" role="switch" aria-checked="true" aria-label="Voice"></button>
    </div>
  </div>

  <button class="backBtn session-only" id="backBtn"><span class="ch">‹</span> Back</button>
  <div class="sessionTitle session-only" id="sessionTitle"></div>

  <div class="stage session-only">
    <div class="boxpath" id="boxpath">
      <svg viewBox="0 0 100 100">
        <rect x="2" y="2" width="96" height="96"></rect>
        <circle class="boxdot" id="boxdot" cx="2" cy="98" r="3.2"></circle>
      </svg>
    </div>
    <div class="orb" id="orb"></div>
    <div class="nose" id="nose">
      <svg viewBox="0 0 100 100">
        <!-- bridge and tip -->
        <path class="outline" d="M44 12 C42 34 38 48 33 60 C29 69 31 77 39 80 C43 81.5 47 80 50 77
                                 C53 80 57 81.5 61 80 C69 77 71 69 67 60 C62 48 58 34 56 12"/>
        <!-- alae (sides of the nose) -->
        <path class="outline" d="M33 60 C26 63 23 70 27 76 C30 80 35 81 39 80"/>
        <path class="outline" d="M67 60 C74 63 77 70 73 76 C70 80 65 81 61 80"/>
        <!-- nostrils: viewer's left arc = user's LEFT nostril -->
        <path class="nostril" id="nostrilL" d="M32 74 C34 78 38 79.5 42 78"/>
        <path class="nostril" id="nostrilR" d="M68 74 C66 78 62 79.5 58 78"/>
        <!-- 'closed' bars (finger/thumb pressing) -->
        <line class="block" id="blockL" x1="27" y1="70" x2="44" y2="82"/>
        <line class="block" id="blockR" x1="73" y1="70" x2="56" y2="82"/>
      </svg>
    </div>
    <div class="nostrils" id="nostrils">
      <div class="nos" id="nosL">LEFT</div>
      <div class="nos" id="nosR">RIGHT</div>
    </div>
  </div>

  <div class="readout session-only">
    <div class="phase" id="phaseTxt">Ready</div>
    <div class="count" id="countTxt">–</div>
    <div class="hint" id="hintTxt">Press begin when you're settled</div>
  </div>

  <div class="progress session-only"><i id="progBar"></i></div>
  <div class="meta session-only" id="metaTxt"></div>

  <div class="controls setup-only">
    <button class="btn primary" id="startBtn" style="flex:1">Begin</button>
  </div>

  <div class="controls session-only">
    <button class="btn ghost" id="endBtn">End</button>
    <button class="btn primary" id="pauseBtn">Pause</button>
  </div>
</main>

<footer id="modeNote" class="setup-only"></footer>
<script>
/* =========================================================
   Techniques — timings verbatim from the source material
   ========================================================= */
const TECH = {
  alt: {
    label: 'Alternate nostril',
    note: 'Optional hand position: right thumb rests over the right nostril, ring finger over the left, forefinger and middle finger between the eyebrows. One cycle covers both sides. Five to ten cycles is typical.',
    phases: [
      {name:'Inhale', secs:4, scale:1.00, hint:'Close the right nostril with your thumb — inhale slowly through the left', tone:294, nostril:'L'},
      {name:'Hold',   secs:2, scale:1.00, hint:'Pause at the top — both nostrils closed', tone:370, nostril:'-'},
      {name:'Exhale', secs:4, scale:0.62, hint:'Lift just the thumb — exhale through the right', tone:247, nostril:'R'},
      {name:'Hold',   secs:1, scale:0.62, hint:'A brief moment, both closed', tone:330, nostril:'-'},
      {name:'Inhale', secs:4, scale:1.00, hint:'Inhale through the right nostril', tone:294, nostril:'R'},
      {name:'Hold',   secs:2, scale:1.00, hint:'Pause at the top — both nostrils closed', tone:370, nostril:'-'},
      {name:'Exhale', secs:4, scale:0.62, hint:'Release the ring finger — exhale through the left', tone:247, nostril:'L'},
      {name:'Hold',   secs:1, scale:0.62, hint:'A brief moment of stillness', tone:330, nostril:'-'}
    ]
  },
  box: {
    label: 'Box breathing',
    note: 'Inhale 4 · hold 4 · exhale 4 · hold 4 — used by Navy SEALs to stay calm and focused. The 4·4·6·2 variation lengthens the exhale for a stronger parasympathetic (relaxation) response; try at least six rounds.',
    variants: {
      classic: [
        {name:'Inhale', secs:4, scale:1.00, hint:'Breathe in through the nose', tone:294, side:0},
        {name:'Hold',   secs:4, scale:1.00, hint:'Lungs full — hold gently',   tone:370, side:1},
        {name:'Exhale', secs:4, scale:0.62, hint:'Release slowly',             tone:247, side:2},
        {name:'Hold',   secs:4, scale:0.62, hint:'Lungs empty — rest here',    tone:330, side:3}
      ],
      sleep: [
        {name:'Inhale', secs:4, scale:1.00, hint:'Breathe in through the nose', tone:294, side:0},
        {name:'Hold',   secs:4, scale:1.00, hint:'Lungs full — hold gently',    tone:370, side:1},
        {name:'Exhale', secs:6, scale:0.62, hint:'Long, slow release — let go', tone:247, side:2},
        {name:'Hold',   secs:2, scale:0.62, hint:'Rest, empty and quiet',       tone:330, side:3}
      ]
    }
  },
  '478': {
    label: '4·7·8 breathing',
    note: 'Dr. Andrew Weil\u2019s relaxing breath. Keep the tip of the tongue behind the upper front teeth throughout. Inhale quietly through the nose, hold, then exhale completely through the mouth with a whoosh. At least four cycles.',
    phases: [
      {name:'Inhale', secs:4, scale:1.00, hint:'Mouth closed — inhale quietly through the nose', tone:294},
      {name:'Hold',   secs:7, scale:1.00, hint:'Hold the breath softly', tone:370},
      {name:'Exhale', secs:8, scale:0.60, hint:'Exhale fully through the mouth — whoosh', tone:247}
    ]
  }
};

/* ================= state ================= */
let mode='box', boxVar='classic', sessKind='cycles', amount=6;
let running=false, paused=false, soundOn=true;
let raf=null;
let phaseIdx=0, cycleNum=0, totalCycles=6, sessionEndMs=0;
let phaseStartMs=0, pausedAtMs=0, fromScale=.68;
let lastShownCount=null, chimedPhase=-1;

const $=id=>document.getElementById(id);
const orb=$('orb'), phaseTxt=$('phaseTxt'), countTxt=$('countTxt'), hintTxt=$('hintTxt'),
      progBar=$('progBar'), metaTxt=$('metaTxt'), startBtn=$('startBtn'),
      pauseBtn=$('pauseBtn'), endBtn=$('endBtn'), backBtn=$('backBtn'),
      sessionTitle=$('sessionTitle'), nostrils=$('nostrils'),
      nosL=$('nosL'), nosR=$('nosR'), boxpath=$('boxpath'), boxdot=$('boxdot'),
      modeNote=$('modeNote');

const phases=()=> mode==='box' ? TECH.box.variants[boxVar] : TECH[mode].phases;

/* =========================================================
   AUDIO — master chain with compressor, audible levels.
   Context is created/resumed inside user gestures so
   iOS Safari and Chrome autoplay policies never block it.
   ========================================================= */
let AC=null, master=null, breathBuf=null;
let activeNodes=[];                       // everything currently sounding, so pause/reset can silence it
function ensureAudio(){
  if(!AC){
    AC = new (window.AudioContext||window.webkitAudioContext)();
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value=-20; comp.ratio.value=4;
    master = AC.createGain(); master.gain.value=1;
    master.connect(comp).connect(AC.destination);
    /* pre-render 3s of smooth noise once, reused for every breath */
    const len=AC.sampleRate*3; breathBuf=AC.createBuffer(1,len,AC.sampleRate);
    const d=breathBuf.getChannelData(0); let last=0;
    for(let i=0;i<len;i++){ const w=Math.random()*2-1; last=.96*last+.04*w; d[i]=last*3; }
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function track(...nodes){ activeNodes.push(...nodes); }
function stopAllSounds(){
  activeNodes.forEach(n=>{ try{n.stop();}catch(e){} try{n.disconnect();}catch(e){} });
  activeNodes=[];
  if('speechSynthesis' in window) speechSynthesis.cancel();
}
/* ---- transition beep: short, clean, marks every phase change ---- */
function beep(){
  if(!soundOn) return;
  const ac=ensureAudio(), t=ac.currentTime;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='sine'; o.frequency.value=880;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(.28,t+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+.12);
  o.connect(g).connect(master);
  o.start(t); o.stop(t+.15); track(o);
}

/* Decoded once into AudioBuffers so playback is instant and goes
   through the same master chain (volume, compressor) as everything else. */
let voiceOn=true, chosenVoice=null;
const voiceBuffers={};
let decodePromise=null;
function decodeVoices(){
  if(decodePromise) return decodePromise;
  const ac=ensureAudio();          // context may stay suspended; decoding still works
  decodePromise = Promise.all(Object.entries(VOICE_CLIPS).map(async ([key,url])=>{
    try{
      const bytes=Uint8Array.from(atob(url.split(',')[1]), c=>c.charCodeAt(0));
      voiceBuffers[key]=await ac.decodeAudioData(bytes.buffer.slice(0));
    }catch(e){ /* clip skipped; speech fallback covers it */ }
  }));
  return decodePromise;
}
function clipKeyFor(p){
  if(mode==='alt' && p.nostril && p.nostril!=='-'){
    return (p.name==='Inhale'?'inhale_':'exhale_')+(p.nostril==='L'?'left':'right');
  }
  if(p.name==='Inhale') return 'inhale';
  if(p.name==='Exhale') return 'exhale';
  return 'hold';                       // no clip yet -> speech fallback
}
function playClip(key){
  const buf=voiceBuffers[key];
  if(!buf) return false;
  const ac=ensureAudio();
  const src=ac.createBufferSource(); src.buffer=buf;
  const g=ac.createGain(); g.gain.value=1.0;
  src.connect(g).connect(master);
  src.start(); track(src);
  return true;
}
/* Browser-voice fallback for any phrase without a recorded clip */
function pickVoice(){
  if(!('speechSynthesis' in window)) return;
  const vs=speechSynthesis.getVoices();
  if(!vs.length) return;
  const prefs=[
    /aria.*natural/i, /jenny.*natural/i, /sonia.*natural/i, /libby.*natural/i,
    /natural/i,
    /samantha/i, /ava/i, /allison/i, /susan/i, /zoe/i,
    /google uk english female/i, /google us english/i,
    /karen/i, /moira/i, /tessa/i, /victoria/i, /zira/i,
    /female/i
  ];
  for(const p of prefs){
    const v=vs.find(v=>p.test(v.name) && v.lang.startsWith('en'));
    if(v){ chosenVoice=v; return; }
  }
  chosenVoice = vs.find(v=>v.lang.startsWith('en')) || vs[0];
}
if('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged=pickVoice;
}
function speakFallback(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(chosenVoice) u.voice=chosenVoice;
  u.rate=.82; u.pitch=1.05; u.volume=.95;
  speechSynthesis.speak(u);
}
/* main entry: recorded clip first, speech only if the clip is missing */
function speakPhase(p){
  if(!voiceOn) return;
  const key=clipKeyFor(p);
  if(playClip(key)) return;                        // already decoded — instant
  decodeVoices().then(()=>{
    if(!playClip(key)) speakFallback(phraseFor(p)); // fallback only if clip is absent
  });
}
function phraseFor(p){
  if(mode==='alt' && p.nostril && p.nostril!=='-'){
    return p.name==='Inhale' ? 'Inhale '+(p.nostril==='L'?'left':'right')
                             : 'Exhale '+(p.nostril==='L'?'left':'right');
  }
  return p.name;
}
/* ---- INHALE: bright, thin stream of air rising fast — like sipping air in ---- */
function inhaleSound(secs){
  if(!soundOn) return;
  const ac=ensureAudio(), t=ac.currentTime, dur=Math.min(secs,6);
  const src=ac.createBufferSource(); src.buffer=breathBuf; src.loop=true;
  const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=3.5;   // narrow = thin, whistly
  bp.frequency.setValueAtTime(700,t);
  bp.frequency.exponentialRampToValueAtTime(2600,t+dur*.9);               // climbs high
  const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=500;
  const g=ac.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(.10,t+dur*.25);
  g.gain.linearRampToValueAtTime(.20,t+dur*.85);                          // grows toward the top
  g.gain.linearRampToValueAtTime(0,t+dur);
  src.connect(hp).connect(bp).connect(g).connect(master);
  src.start(t); src.stop(t+dur+.05); track(src);
}
/* ---- EXHALE: deep, wide sigh falling low — unmistakably different ---- */
function exhaleSound(secs){
  if(!soundOn) return;
  const ac=ensureAudio(), t=ac.currentTime, dur=Math.min(secs,9);
  const src=ac.createBufferSource(); src.buffer=breathBuf; src.loop=true;
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=.7;     // wide + dark
  lp.frequency.setValueAtTime(1100,t);
  lp.frequency.exponentialRampToValueAtTime(160,t+dur);                   // sinks very low
  const g=ac.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(.30,t+dur*.12);                          // strong start, long fade
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  /* soft sub-tone glide underneath, like a sigh */
  const o=ac.createOscillator(), og=ac.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(150,t);
  o.frequency.exponentialRampToValueAtTime(70,t+dur);
  og.gain.setValueAtTime(0,t);
  og.gain.linearRampToValueAtTime(.05,t+dur*.15);
  og.gain.exponentialRampToValueAtTime(.0001,t+dur);
  src.connect(lp).connect(g).connect(master);
  o.connect(og).connect(master);
  src.start(t); src.stop(t+dur+.05);
  o.start(t); o.stop(t+dur+.05);
  track(src,o);
}
/* ---- HOLD: slow resting heartbeat, one lub-dub per second ---- */
function thump(t,vol){
  const ac=AC;
  /* body of the beat — triangle wave has harmonics small speakers can render */
  const o=ac.createOscillator(), g=ac.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(150,t);
  o.frequency.exponentialRampToValueAtTime(55,t+.16);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+.24);
  o.connect(g).connect(master);
  o.start(t); o.stop(t+.28); track(o);
  /* muffled knock on top so the beat reads clearly */
  const src=ac.createBufferSource(); src.buffer=breathBuf;
  const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=320;
  const ng=ac.createGain();
  ng.gain.setValueAtTime(0,t);
  ng.gain.linearRampToValueAtTime(vol*.7,t+.008);
  ng.gain.exponentialRampToValueAtTime(.0001,t+.09);
  src.connect(lp).connect(ng).connect(master);
  src.start(t); src.stop(t+.12); track(src);
}
function heartbeatSound(secs){
  if(!soundOn) return;
  const ac=ensureAudio(), t=ac.currentTime;
  const beats=Math.max(1,Math.floor(secs));                    // ~60 bpm resting rate
  for(let i=0;i<beats;i++){
    const bt=t+.12+i*1.0;
    if(bt+.42 > t+secs) break;                                 // never spill into the next phase
    thump(bt,.30);                                             // lub
    thump(bt+.30,.18);                                         // dub (softer)
  }
}
function phaseSound(p){
  beep();                                   // signals the transition
  speakPhase(p);                            // your recorded voice (speech fallback)
  if(p.name==='Inhale') inhaleSound(p.secs);
  else if(p.name==='Exhale') exhaleSound(p.secs);
  else heartbeatSound(p.secs);
}
function endBell(){
  if(!soundOn) return;
  const ac=ensureAudio(), t=ac.currentTime;
  [523.25,659.25,783.99].forEach((f,i)=>{
    const o=ac.createOscillator(), g=ac.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t+i*.45);
    g.gain.linearRampToValueAtTime(.2,t+i*.45+.05);
    g.gain.exponentialRampToValueAtTime(.0001,t+i*.45+3);
    o.connect(g).connect(master);
    o.start(t+i*.45); o.stop(t+i*.45+3.2);
  });
}

/* =========================================================
   ENGINE — one rAF loop driven by performance.now().
   Phase boundaries are computed from elapsed real time,
   so every phase lasts exactly its listed duration.
   ========================================================= */
function easeInOut(f){ return f<.5 ? 2*f*f : 1-Math.pow(-2*f+2,2)/2; }
function boxDotPos(side,f){
  const a=2,b=98,L=x=>a+(b-a)*x, R=x=>b-(b-a)*x;
  if(side===0) return [a, R(f)];
  if(side===1) return [L(f), a];
  if(side===2) return [b, L(f)];
  return [R(f), b];
}
function setNostrils(state){
  nosL.className='nos'; nosR.className='nos';
  const nL=$('nostrilL'), nR=$('nostrilR'), bL=$('blockL'), bR=$('blockR');
  nL.classList.remove('open','closed'); nR.classList.remove('open','closed');
  bL.classList.remove('show'); bR.classList.remove('show');
  if(state==='L'){
    nosL.classList.add('open'); nosR.classList.add('closed');
    nL.classList.add('open');  nR.classList.add('closed'); bR.classList.add('show');
  } else if(state==='R'){
    nosR.classList.add('open'); nosL.classList.add('closed');
    nR.classList.add('open');  nL.classList.add('closed'); bL.classList.add('show');
  } else if(state==='-'){
    nosL.classList.add('closed'); nosR.classList.add('closed');
    nL.classList.add('closed');  nR.classList.add('closed');
    bL.classList.add('show');    bR.classList.add('show');
  }
}
function enterPhase(i){
  const p=phases()[i];
  phaseTxt.textContent=p.name;
  hintTxt.textContent=p.hint;
  orb.classList.toggle('exh', p.name==='Exhale');
  orb.classList.toggle('hold', p.name==='Hold');
  if(mode==='alt') setNostrils(p.nostril);
  if(chimedPhase!==i){ phaseSound(p); chimedPhase=i; }
}
function loop(){
  if(!running||paused) return;
  const now=performance.now();
  const list=phases(), p=list[phaseIdx];
  const elapsed=(now-phaseStartMs)/1000;

  if(elapsed >= p.secs){
    /* advance — carry over any tiny overshoot so timing never drifts */
    fromScale = p.scale;
    phaseStartMs += p.secs*1000;
    phaseIdx++;
    chimedPhase=-1;
    if(phaseIdx>=list.length){
      phaseIdx=0; cycleNum++;
      if(sessionDone()) return finish();
    }
    enterPhase(phaseIdx);
    updateProgress();
    lastShownCount=null;
    raf=requestAnimationFrame(loop);
    return;
  }

  /* countdown — shows the full duration for its full second (e.g. "2" for a whole second) */
  const remaining = Math.ceil(p.secs - elapsed);
  if(remaining!==lastShownCount){ countTxt.textContent=remaining; lastShownCount=remaining; }

  /* orb + box dot */
  const f = elapsed/p.secs, e = easeInOut(f);
  orb.style.transform = `scale(${fromScale + (p.scale-fromScale)*e})`;
  if(mode==='box'){
    const [cx,cy]=boxDotPos(p.side,f);
    boxdot.setAttribute('cx',cx); boxdot.setAttribute('cy',cy);
  }
  if(sessKind==='time') updateProgress();
  raf=requestAnimationFrame(loop);
}
function sessionDone(){
  return sessKind==='cycles' ? cycleNum>=totalCycles : Date.now()>=sessionEndMs;
}
function updateProgress(){
  let f;
  if(sessKind==='cycles'){
    f=cycleNum/totalCycles;
    metaTxt.textContent=`Cycle ${Math.min(cycleNum+1,totalCycles)} of ${totalCycles}`;
  }else{
    const total=amount*60*1000;
    const left=Math.max(sessionEndMs-Date.now(),0);
    f=1-left/total;
    const m=Math.floor(left/60000), s=Math.floor(left%60000/1000);
    metaTxt.textContent=`${m}:${String(s).padStart(2,'0')} remaining`;
  }
  progBar.style.width=Math.min(f*100,100)+'%';
}

/* ================= session control ================= */
function start(){
  ensureAudio();                       // unlock inside the tap
  decodeVoices();                      // prepare recorded voice clips
  running=true; paused=false;
  phaseIdx=0; cycleNum=0; fromScale=.68; chimedPhase=-1; lastShownCount=null;
  if(sessKind==='cycles') totalCycles=amount;
  else sessionEndMs=Date.now()+amount*60*1000;
  document.body.classList.add('insession');
  keepAwake();                         // stop the phone from sleeping mid-session
  sessionTitle.textContent=TECH[mode].label;
  pauseBtn.disabled=false; pauseBtn.textContent='Pause';
  phaseStartMs=performance.now();
  enterPhase(0); updateProgress();
  raf=requestAnimationFrame(loop);
}
function togglePause(){
  if(!running) return;
  paused=!paused;
  pauseBtn.textContent=paused?'Resume':'Pause';
  if(paused){
    cancelAnimationFrame(raf);
    pausedAtMs=performance.now();
    if(sessKind==='time') togglePause._timeLeft=sessionEndMs-Date.now();
    phaseTxt.textContent='Paused';
    stopAllSounds();
    releaseWake();
  }else{
    ensureAudio(); keepAwake();
    phaseStartMs += performance.now()-pausedAtMs;      // shift clock by pause length
    if(sessKind==='time') sessionEndMs=Date.now()+togglePause._timeLeft;
    chimedPhase=phaseIdx; enterPhase(phaseIdx);        // no duplicate sound from enterPhase
    const p=phases()[phaseIdx];
    const remain=p.secs-(performance.now()-phaseStartMs)/1000;
    if(remain>.4){                                     // resume audio for what's left of the phase
      if(p.name==='Inhale') inhaleSound(remain);
      else if(p.name==='Exhale') exhaleSound(remain);
      else heartbeatSound(remain);
    }
    raf=requestAnimationFrame(loop);
  }
}
function finish(){
  stopEngine();
  releaseWake();
  pauseBtn.disabled=true;
  phaseTxt.textContent='Complete';
  countTxt.textContent='✓';
  hintTxt.textContent='Well done. Carry this calm with you.';
  progBar.style.width='100%'; metaTxt.textContent='';
  orb.className='orb'; orb.style.transform='scale(.68)';
  stopAllSounds(); endBell();
}
function leaveSession(){
  stopEngine(); stopAllSounds();
  releaseWake();
  document.body.classList.remove('insession');
  resetVisuals();
}
function resetVisuals(){
  phaseTxt.textContent='Ready'; countTxt.textContent='–';
  hintTxt.textContent='Press begin when you\u2019re settled';
  progBar.style.width='0%';
  orb.className='orb'; orb.style.transform='scale(.68)';
  boxdot.setAttribute('cx',2); boxdot.setAttribute('cy',98);
  nosL.className='nos'; nosR.className='nos';
  refreshMeta();
}
function stopEngine(){
  running=false; paused=false; cancelAnimationFrame(raf);
  pauseBtn.textContent='Pause';
}

let wakeLock=null, wakeVideo=null;
async function keepAwake(){
  if('wakeLock' in navigator){
    try{
      wakeLock = await navigator.wakeLock.request('screen');
      return;
    }catch(e){ /* fall through to video method */ }
  }
  if(!wakeVideo){
    wakeVideo=document.createElement('video');
    wakeVideo.src=WAKE_VIDEO;
    wakeVideo.loop=true; wakeVideo.muted=true;
    wakeVideo.setAttribute('playsinline','');
    wakeVideo.style.cssText='position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
    document.body.appendChild(wakeVideo);
  }
  wakeVideo.play().catch(()=>{});
}
function releaseWake(){
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; }
  if(wakeVideo) wakeVideo.pause();
}
/* the OS drops wake locks when the tab is hidden — re-grab on return */
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && running && !paused) keepAwake();
});

/* ================= UI ================= */
function refreshMeta(){
  metaTxt.textContent = sessKind==='cycles'
    ? `${amount} cycles · ${TECH[mode].label}`
    : `${amount} min · ${TECH[mode].label}`;
}
function selectMode(m){
  mode=m;
  document.querySelectorAll('#modeSeg button').forEach(b=>{
    const on=b.dataset.mode===m;
    b.classList.toggle('on',on); b.setAttribute('aria-selected',on);
  });
  boxpath.classList.toggle('show', m==='box');
  $('boxVarRow').classList.toggle('show', m==='box');
  nostrils.classList.toggle('show', m==='alt');
  $('nose').classList.toggle('show', m==='alt');
  modeNote.textContent=TECH[m].note;
  if(sessKind==='cycles'){
    amount = m==='478' ? 4 : 6;
    $('amtVal').textContent=amount;
  }
  resetVisuals();
}
document.querySelectorAll('#modeSeg button').forEach(b=>
  b.addEventListener('click',()=>{ if(!running) selectMode(b.dataset.mode); }));

$('sessSeg').querySelectorAll('button').forEach(b=>
  b.addEventListener('click',()=>{
    if(running) return;
    sessKind=b.dataset.kind;
    $('sessSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    amount = sessKind==='cycles' ? (mode==='478'?4:6) : 3;
    $('amtVal').textContent=amount;
    $('amtLabel').textContent = sessKind==='cycles' ? 'Cycles' : 'Minutes';
    $('sessSub').textContent = sessKind==='cycles' ? 'Number of full cycles' : 'Total session length';
    refreshMeta();
  }));

$('boxVarSeg').querySelectorAll('button').forEach(b=>
  b.addEventListener('click',()=>{
    if(running) return;
    boxVar=b.dataset.var;
    $('boxVarSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
  }));

$('minus').addEventListener('click',()=>{ if(running)return;
  amount=Math.max(1,amount-1); $('amtVal').textContent=amount; refreshMeta(); });
$('plus').addEventListener('click',()=>{ if(running)return;
  amount=Math.min(30,amount+1); $('amtVal').textContent=amount; refreshMeta(); });

const soundToggle=$('soundToggle');
soundToggle.addEventListener('click',()=>{
  soundOn=!soundOn;
  soundToggle.classList.toggle('on',soundOn);
  soundToggle.setAttribute('aria-checked',soundOn);
  if(soundOn){ ensureAudio(); inhaleSound(1.6); }    // quick breath = audible confirmation
  else stopAllSounds();
});

const voiceToggle=$('voiceToggle');
voiceToggle.addEventListener('click',()=>{
  voiceOn=!voiceOn;
  voiceToggle.classList.toggle('on',voiceOn);
  voiceToggle.setAttribute('aria-checked',voiceOn);
  if(voiceOn){ ensureAudio(); decodeVoices().then(()=>playClip('inhale')); }
  else if('speechSynthesis' in window) speechSynthesis.cancel();
});
if(!('speechSynthesis' in window)) voiceToggle.closest('.row').style.display='none';

startBtn.addEventListener('click',start);
pauseBtn.addEventListener('click',togglePause);
endBtn.addEventListener('click',leaveSession);
backBtn.addEventListener('click',leaveSession);

selectMode('box');
decodeVoices();     // decode recorded voice clips at page load, before any session
